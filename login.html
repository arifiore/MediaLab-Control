<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
 <!-- comentario -->
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1"/>
    <title>Iniciar Sesión | MediaLab Control</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet"/>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"/>
    <style>
        body { background: linear-gradient(135deg,#1e3a8a 0%,#1e293b 100%); min-height:100vh; display:flex; align-items:center; justify-content:center; font-family:'Segoe UI',sans-serif; }
        .login-card { background:white; padding:42px 40px; border-radius:18px; box-shadow:0 20px 60px rgba(0,0,0,0.3); width:100%; max-width:400px; }
        .login-icon { width:64px; height:64px; background:#dbeafe; border-radius:16px; display:flex; align-items:center; justify-content:center; margin:0 auto 16px; font-size:28px; color:#2563eb; }
        .login-title { font-weight:800; text-align:center; color:#1e293b; margin-bottom:4px; letter-spacing:1px; }
        .login-sub { text-align:center; color:#64748b; font-size:0.88rem; margin-bottom:28px; }
        .form-label { font-size:0.88rem; font-weight:600; color:#475569; }
        .form-control { border-radius:8px; border:1px solid #e2e8f0; padding:10px 14px; }
        .form-control:focus { border-color:#2563eb; box-shadow:0 0 0 3px rgba(37,99,235,0.12); }
        .btn-login { background:#2563eb; color:white; border:none; border-radius:8px; padding:11px; font-weight:700; font-size:1rem; letter-spacing:.5px; transition:.2s; }
        .btn-login:hover { background:#1d4ed8; color:white; }
        .footer-text { text-align:center; color:#94a3b8; font-size:0.78rem; margin-top:20px; }
    </style>
</head>
<body>
    <div class="login-card">
        <div class="login-icon"><i class="fa-solid fa-video"></i></div>
        <h3 class="login-title">MEDIALAB CONTROL</h3>
        <p class="login-sub">Sistema de Préstamos de Equipos</p>

        <div th:if="${param.error}" class="alert alert-danger text-center py-2 small mb-3">
            <i class="fa-solid fa-triangle-exclamation me-1"></i>Credenciales incorrectas.
        </div>
        <div th:if="${param.logout}" class="alert alert-success text-center py-2 small mb-3">
            <i class="fa-solid fa-check me-1"></i>Sesión cerrada correctamente.
        </div>

        <form th:action="@{/login}" method="post">
            <div class="mb-3">
                <label class="form-label">Usuario</label>
                <input type="text" name="username" class="form-control" placeholder="operador" required autofocus>
            </div>
            <div class="mb-4">
                <label class="form-label">Contraseña</label>
                <input type="password" name="password" class="form-control" placeholder="••••••••••" required>
            </div>
            <button type="submit" class="btn btn-login w-100">
                <i class="fa-solid fa-right-to-bracket me-2"></i>INGRESAR
            </button>
        </form>
        <p class="footer-text">localhost:8080 &mdash; Universidad Peruana Unión &copy; 2026</p>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
