<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head('Equipos')}"></head>
<body>
<div class="wrapper">
    <div th:replace="~{fragments/layout :: sidebar('equipos')}"></div>
    
    <div class="main-area">
        <div th:replace="~{fragments/layout :: topbar}"></div>

    <div id="content">
        <!-- Alerts -->
        <div th:if="${exito}" class="alert alert-success alert-dismissible fade show">
            <i class="fa-solid fa-check-circle me-2"></i><span th:text="${exito}"></span>
            <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
        </div>
        <div th:if="${error}" class="alert alert-danger alert-dismissible fade show">
            <i class="fa-solid fa-triangle-exclamation me-2"></i><span th:text="${error}"></span>
            <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
        </div>

        <div class="page-header">
            <h2 class="page-title">Gestión de Inventario <span class="breadcrumb-text">> Equipos</span></h2>
            <a th:href="@{/equipos/nuevo}" class="btn btn-blue px-4">
                <i class="fa-solid fa-plus me-2"></i>Nuevo Equipo
            </a>
        </div>

        <!-- Filtro búsqueda -->
        <form th:action="@{/equipos}" method="get" class="filter-section shadow-sm">
            <div class="row g-3 align-items-end">
                <div class="col-md-8">
                    <label>Buscar:</label>
                    <input type="text" name="q" class="form-control" th:value="${q}"
                           placeholder="Código, nombre, tipo...">
                </div>
                <div class="col-md-2">
                    <button type="submit" class="btn btn-blue w-100">
                        <i class="fa-solid fa-search me-1"></i>Buscar
                    </button>
                </div>
                <div class="col-md-2">
                    <a th:href="@{/equipos}" class="btn btn-light border w-100">Limpiar</a>
                </div>
            </div>
        </form>

        <div class="table-card shadow-sm">
            <div class="table-responsive">
                <table class="table mb-0">
                    <thead>
                        <tr>
                            <th>ID</th>
                            <th>Código Patrimonial</th>
                            <th>Nombre</th>
                            <th>Tipo</th>
                            <th>Estado</th>
                            <th class="text-center">Acciones</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr th:each="e : ${equipos}">
                            <td th:text="${e.id}"></td>
                            <td class="fw-bold text-secondary" th:text="${e.codigoPatrimonial}"></td>
                            <td th:text="${e.nombre}"></td>
                            <td th:text="${e.tipo}"></td>
                            <td>
                                <span th:switch="${e.estado}">
                                    <span th:case="'DISPONIBLE'" class="badge-disponible">Disponible</span>
                                    <span th:case="'PRESTADO'" class="badge-prestado">Prestado</span>
                                    <span th:case="'MANTENIMIENTO'" class="badge-mantenimiento">Mantenimiento</span>
                                    <span th:case="*" th:text="${e.estado}" class="badge-inactivo"></span>
                                </span>
                            </td>
                            <td class="text-center">
                                <a th:href="@{/equipos/editar/{id}(id=${e.id})}" class="btn-action" title="Editar">
                                    <i class="fa-solid fa-pen"></i>
                                </a>
                                <form th:action="@{/equipos/eliminar/{id}(id=${e.id})}" method="post" style="display:inline">
                                    <button type="submit" class="btn-action danger" title="Eliminar"
                                            onclick="return confirm('¿Eliminar este equipo?')">
                                        <i class="fa-solid fa-trash"></i>
                                    </button>
                                </form>
                            </td>
                        </tr>
                        <tr th:if="${#lists.isEmpty(equipos)}">
                            <td colspan="6" class="text-center text-muted py-5">
                                <i class="fa-solid fa-inbox fa-2x mb-2 d-block"></i>No se encontraron equipos.
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
            <div class="table-footer">
                <div class="text-muted small">
                    <span th:text="${#lists.size(equipos)}">0</span> registro(s) encontrado(s)
                </div>
            </div>
        </div>
    </div>
</div>
<div th:replace="~{fragments/layout :: scripts}"></div>
</body>
</html>
