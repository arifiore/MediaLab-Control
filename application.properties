# =============================================
# MediaLab Control - Configuración LOCAL
# Motor: MySQL / MariaDB (localhost)
# =============================================

spring.application.name=medialab-control
server.port=8080

# Base de datos MySQL LOCAL
spring.datasource.url=jdbc:mysql://localhost:3306/medialab_db?useSSL=false&serverTimezone=America/Lima&allowPublicKeyRetrieval=true&characterEncoding=UTF-8
spring.datasource.username=root
spring.datasource.password=
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA - usar esquema existente del .sql adjunto
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.open-in-view=false

# Thymeleaf
spring.thymeleaf.cache=false
spring.thymeleaf.encoding=UTF-8

# Zona horaria Peru
spring.jackson.time-zone=America/Lima

# Logback: nivel DEBUG para el paquete del proyecto
logging.level.com.medialab=DEBUG
logging.level.org.springframework.security=WARN
